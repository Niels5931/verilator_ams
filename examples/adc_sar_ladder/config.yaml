# SAR ADC co-simulation using an ideal R-2R ladder DAC
pdk:
  root: $PDK_ROOT
  variant: sky130A
  corner: tt

top: ams_top

verilog_sources:
  - verilog/ams_top.sv
  - verilog/sar_adc_controller.sv

analog_sources:
  - spice/adc_sar_ladder.spice

mapping:
  adc_sar_ladder: adc_sar_ladder

spice_models: []

ams_cosim:
  clock_period_ns: 100
  vdd: 1.8
  spice_netlist: spice/adc_sar_ladder.spice

  digital_to_analog:
    - name: b0
      spice_source: b0
      verilog_port: b0
      width: 1
      vdd: 1.8
    - name: b1
      spice_source: b1
      verilog_port: b1
      width: 1
      vdd: 1.8
    - name: b2
      spice_source: b2
      verilog_port: b2
      width: 1
      vdd: 1.8
    - name: b3
      spice_source: b3
      verilog_port: b3
      width: 1
      vdd: 1.8

  analog_to_digital:
    - name: cmp_out
      spice_node: cmp_out
      verilog_port: cmp_in
      width: 1
      vdd: 1.8
